<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#141414"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="gold" x1="10" y1="10" x2="54" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFC933"/>
      <stop offset="40%" stop-color="#FFB800"/>
      <stop offset="100%" stop-color="#CC9200"/>
    </linearGradient>
    <linearGradient id="goldGlow" x1="32" y1="32" x2="32" y2="6" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFB800" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FFB800" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="innerShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset dx="0" dy="1"/>
      <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1"/>
      <feFlood flood-color="#000000" flood-opacity="0.4"/>
      <feComposite in2="SourceGraphic" operator="in"/>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode/>
      </feMerge>
    </filter>
    <clipPath id="roundClip">
      <rect width="64" height="64" rx="14" ry="14"/>
    </clipPath>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>
  <rect width="64" height="64" rx="14" ry="14" fill="none" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Subtle amber radial glow behind content -->
  <ellipse cx="32" cy="30" rx="26" ry="24" fill="url(#goldGlow)" clip-path="url(#roundClip)"/>

  <!-- Tube glass envelope - main body -->
  <rect x="22" y="14" width="20" height="32" rx="10" ry="10" fill="none" stroke="url(#gold)" stroke-width="2.2" filter="url(#glow)"/>

  <!-- Inner filament glow -->
  <ellipse cx="32" cy="28" rx="5" ry="6" fill="#FFB800" opacity="0.08"/>
  <ellipse cx="32" cy="28" rx="3" ry="4" fill="#FFB800" opacity="0.12"/>

  <!-- Anode plate (top grid lines) -->
  <line x1="27" y1="20" x2="37" y2="20" stroke="#FFB800" stroke-width="1.2" opacity="0.6"/>
  <line x1="28" y1="23" x2="36" y2="23" stroke="#FFB800" stroke-width="1" opacity="0.4"/>

  <!-- Cathode (bottom V shape) -->
  <path d="M29 34 L32 30 L35 34" fill="none" stroke="#FFB800" stroke-width="1.2" opacity="0.7"/>
  <line x1="29" y1="34" x2="35" y2="34" stroke="#FFB800" stroke-width="1.2" opacity="0.7"/>

  <!-- Heater wires inside -->
  <line x1="30" y1="36" x2="34" y2="36" stroke="#FFB800" stroke-width="0.8" opacity="0.3"/>

  <!-- Tube base / pins -->
  <rect x="26" y="45" width="12" height="6" rx="2" ry="2" fill="#1a1a1a" stroke="#333" stroke-width="0.8"/>
  <line x1="28" y1="51" x2="28" y2="55" stroke="#FFB800" stroke-width="1.2" opacity="0.5"/>
  <line x1="32" y1="51" x2="32" y2="55" stroke="#FFB800" stroke-width="1.2" opacity="0.5"/>
  <line x1="36" y1="51" x2="36" y2="55" stroke="#FFB800" stroke-width="1.2" opacity="0.5"/>

  <!-- Top cap getter -->
  <circle cx="32" cy="16" r="2" fill="#FFB800" opacity="0.25"/>
  <circle cx="32" cy="16" r="1" fill="#FFB800" opacity="0.5"/>

  <!-- "A" letter integrated subtly -->
  <text x="32" y="62" font-family="Arial, Helvetica, sans-serif" font-size="7" font-weight="bold" fill="#FFB800" opacity="0.3" text-anchor="middle" letter-spacing="0.5">AMP</text>
</svg>
